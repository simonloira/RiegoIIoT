<html lang="es">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <script type="importmap">
            {
            "imports": {
                "@material/web/": "https://esm.run/@material/web/"
            }
            }
        </script>
        <script type="module">
            // Importa los componentes de Material Web necesarios
            import '@material/web/all.js';
            import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';
            

            document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
        </script>
        <!-- Importar fuente Roboto -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

        <title>Riego automático</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <meta name="description" content="Control remoto del riego">
        <meta name="robots" content="index, follow">
        <meta name="theme-color" content="#09f">

        <link rel="icon" type="image/jpeg" href="riegoAutomático/frontend/RiegoAutomático/static/favicon.jpeg">
        <style>
            body{
                background-color: rgb(222, 239, 240);
            }
            .login-window{
                position: fixed;              /* fixed */
                inset: 0;                     /* inset-0 */          /* z-[99999999] */
                display: flex;                /* flex */
                flex-direction: column;       /* flex-col */
                align-items: center;          /* items-center */
                left: 50%;                    /* left-1/2 */
                top: 50vh;                    /* top-[50vh]! */
                transform: translate(-50%, -50%); /* -translate-x-1/2 -translate-y-1/2 */
                padding: 2rem;                /* p-8 */
                padding-top: 5rem;            /* pt-20 */
                width: 100%;                  /* w-full */
                max-width: 24rem;             /* max-w-sm (384px) */
                margin-left: 1rem;            /* mx-4 (lado izq) */
                margin-right: 1rem;           /* mx-4 (lado der) */
                color: rgb(0, 0, 0);                 /* text-white */
                background-color: white;
                border-radius: 1.5rem;       /* rounded-xl */
                box-shadow: 0 10px 15px rgba(0,0,0,0.2); /* shadow-xl */
                justify-content: center;
            }

            #error{
                border-radius: 1rem; 
                background: #c93b3b;
                font-family: Roboto;
                font-weight:800;
                color: rgb(36, 36, 36);
                border: none;
                text-align: center;
                padding: 1rem;
                
            }

            md-checkbox {
                --md-checkbox-outline-color: #1fa051; 
                --md-checkbox-hover-outline-color: #1976D2; 
                --md-sys-color-primary: #00aa33;
            }

            md-filled-button{
                --md-filled-button-container-color: rgb(50, 177, 0);
                --md-filled-button-label-text-color: rgb(255, 255, 255);
            }
        </style>

    </head>
    <body>
        <main>
            <div class="login-window">
                <h1 id="title" style="font-family: Roboto; margin-top: 0;">Riego automático</h1>
                <md-outlined-text-field id="user-input" label="Usuario" style="width: 100%; padding: 6; margin-bottom: 0.9em;"></md-outlined-text-field>
                <md-outlined-text-field id="password-input" label="Contraseña" type="password" style="width: 100%; padding: 6; margin-bottom: 0.9em; border-radius: 6px; "></md-outlined-text-field>
                <md-filled-button id="enter" type="submit">Entrar</md-filled-button>
                <p id = "login-message"></p>
            </div>

            <dialog id="error" style="justify-content: center;"></dialog>
        </main>
    </body>

    <script> //Socket 
        let miStorage = window.localStorage;
        let socket = new WebSocket(`ws://${window.location.hostname}:8000/ws`);
 
        socket.onerror = () => {
            document.querySelector(".login-window").style.filter = "blur(6px)";
            const dialog = document.getElementById("error");
            dialog.innerHTML = `<h3>Error</h3> <p>Servidor no conectado</p>`;
            dialog.showModal();
        }

        //Comprueba el estado correcto del token
        socket.onopen = () => { 
            console.log("Conectado al WebSocket"); 
            
            if (localStorage.getItem("loggedIn") && (localStorage.getItem("token") !== "")){
                console.log("Comprobando el token")
                socket.send(JSON.stringify({comando: "check_signature",
                                        token: localStorage.getItem("token")}))
            }
        }

        //Recibe los datos desde el backend
        socket.onmessage = (event) => { 
            const data = JSON.parse(event.data); 
            if (data["loggedIn"]){
                    document.getElementById("login-message").innerText = "";
                    document.cookie = `auth_token=${data.token}; path=/; SameSite=Lax;`;
                    console.log("Nos vamos a index!!!")
                    localStorage.setItem("token", data["token"]);
                    localStorage.setItem("loggedIn", data["loggedIn"]);
                    // reload the current page
                    window.location.reload();
                }
            
            if (enterClicked && !data["loggedIn"]){
                setTimeout(() => {
                    document.getElementById("login-message").innerText = "Usuario o contraseña incorrectos.";
                    }, 1000);
            }   
            
            if (data["logoConectado"]){
                console.log("Logo conectado")
            }else{
                console.log("Logo desconectado")
            }
            }
    </script>

    <script> 
        //Enviar solicitud login-window
        const buttonEnter = document.getElementById("enter")
        let enterClicked = false
        
        buttonEnter.onclick = (event) => {
            socket.send(JSON.stringify({ comando: "login", 
                                         user: document.getElementById("user-input").value,
                                         password: document.getElementById("password-input").value
                                        }));                    
                        enterClicked = true;
            }
        
    </script>
</html>
