<!DOCTYPE html>
<html lang="es">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <script type="importmap">
            {
            "imports": {
                "@material/web/": "https://esm.run/@material/web/"
            }
            }
        </script>
        <script type="module">
            // Importa los componentes de Material Web necesarios
            import '@material/web/all.js';
            import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';
            
            document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

        <title>Historial - Riego automático</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <meta name="description" content="Historial del sistema de riego">
        <meta property="og:title" content="Historial - Control remoto del riego">
        <meta property="og:description" content="Historial de eventos del sistema de riego">
        <meta property="og:image" content="./static/visionSat.jpeg">
        <meta name="robots" content="index, follow">
        <meta name="theme-color" content="#09f">
        <link rel="icon" type="image/jpeg" href="../favicon.jpeg">
        <link href="{{ url_for('static', path='/styles/styles-history.css') }}" rel="stylesheet">
        <link href="{{ url_for('static', path='/styles/fonts.css') }}" rel="stylesheet">
    </head>
    <body>
        <div class="header">
            <h1 class="page-title">Historial del sistema</h1>
            <a href="/"  class="back-btn">
                ← Volver al inicio
            </a>
        </div>
        <div class="container">
            <!-- Panel del Servidor -->
            <div class="history-panel server-panel">
                <div class="panel-header">
                    <div class="panel-icon">S</div>
                    <h2 class="panel-title">
                        <span class="status-indicator server-status"></span>
                        Historial del Servidor
                    </h2>
                    <button class="refresh-btn" onclick="refreshHistory()" title="Actualizar historial">
                        ↻
                    </button>
                </div>
                <div class="history-content" id="server-history">
                    <div class="empty-state">
                        <div class="empty-icon">⚡</div>
                        <p>Conectando al servidor...</p>
                    </div>
                </div>
            </div>

            <!-- Panel del LOGO -->
            <div class="history-panel logo-panel">
                <div class="panel-header">
                    <div class="panel-icon">L</div>
                    <h2 class="panel-title">
                        <span class="status-indicator logo-status"></span>
                        Historial del LOGO PLC
                    </h2>
                    <button class="refresh-btn" onclick="refreshHistory()" title="Actualizar historial">
                        ↻
                    </button>
                </div>
                <div class="history-content" id="logo-history">
                    <div class="empty-state">
                        <div class="empty-icon">🔌</div>
                        <p>Esperando datos del PLC...</p>
                    </div>
                </div>
            </div>
        </div>

        <script>
            getHistory()
            async function getHistory() {
                const response = await fetch('/history-data', {
                    method: 'GET',
                });

                const data = await response.json();
                
                if (response.ok) {
                    updateHistory(data.history)
                }else{
                    showError("server-history", "Error de conexión con el servidor");
                    showError("logo-history", "Error de conexión con el PLC");
                }
            }

            function refreshHistory() {
                console.log("Refrescando historial...");
                
                // Animar botones de refresco
                const refreshBtns = document.querySelectorAll('.refresh-btn');
                refreshBtns.forEach(btn => {
                    btn.classList.add('spinning');
                    btn.disabled = true;
                });

                // Mostrar estado de carga
                showLoading("server-history", "Actualizando servidor...");
                showLoading("logo-history", "Actualizando PLC...");

                getHistory()
                
                // Quitar animación después de un tiempo
                setTimeout(() => {
                    refreshBtns.forEach(btn => {
                        btn.classList.remove('spinning');
                        btn.disabled = false;
                    });
                }, 1500);
            }
        </script>

        <script>
            function updateHistory(historyData) {
                // Actualizar historial del servidor
                if (historyData.users) {
                    updatePanel("server-history", historyData.users, "users");
                }
                
                // Actualizar historial del LOGO
                if (historyData.plc) {
                    updatePanel("logo-history", historyData.plc, "plc");
                }
            }

            function updatePanel(panelId, data, type) {
                const panel = document.getElementById(panelId);
                
                if (!data || Object.keys(data).length === 0) {
                    const emptyIcon = type === "users" ? "⚡" : "🔌";
                    const emptyMessage = type === "users" ?
                        "No hay eventos del servidor" : 
                        "No hay eventos del PLC";
                    
                    panel.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">${emptyIcon}</div>
                            <p>${emptyMessage}</p>
                        </div>
                    `;
                    return;
                }

                let entries = [];

                if (type === "users") {
                    // data = history.users → { "192.168.1.56": { ip, event, timestamp, name }, ... }
                    for (let ip of Object.keys(data)) {
                        const { timestamp, name, event } = data[ip];
                        const message = `${name} (${ip}) - ${event}`;
                        entries.push({ timestamp, message });
                    }

                } else {
                    // data = history.plc → { "zona": [ {event, timestamp, duration, zone}, ... ], ... }
                    for (let zone of Object.keys(data)) {
                        for (let ev of data[zone]) {
                            const message = `Zona ${ev.zone} - ${ev.event} (${ev.duration}s)`;
                            entries.push({ timestamp: ev.timestamp, message });
                        }
                    }
                }

                // Ordenar de más reciente a más antiguo
                entries.sort((a, b) => b.timestamp - a.timestamp);

                panel.innerHTML = entries
                    .map(e => createHistoryEntry(formatTimestamp(e.timestamp), e.message))
                    .join("");
            }

            function createHistoryEntry(timestamp, message) {
                return `
                    <div class="history-entry">
                        <span class="entry-time">${timestamp}</span>
                        <p class="entry-message">${message}</p>
                    </div>
                `;
            }

            function formatTimestamp(ts) {
                return new Date(ts * 1000).toLocaleString("es-ES");
            }

            function showLoading(panelId, message) {
                const panel = document.getElementById(panelId);
                panel.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔄</div>
                        <p>${message}</p>
                    </div>
                `;
            }

            function showError(panelId, errorMessage) {
                const panel = document.getElementById(panelId);
                panel.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <p>${errorMessage}</p>
                    </div>
                `;
            }
        </script>
    </body>
</html>
